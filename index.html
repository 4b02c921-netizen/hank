<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HMI 終極集成 V37</title>
    <style>
        :root { --bg: #000; --card: #1c1c1e; --primary: #0a84ff; --success: #30d158; --danger: #ff453a; --text: #fff; --dim: #8e8e93; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; box-sizing: border-box; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        .display { background: var(--card); padding: 15px; border-radius: 12px; border: 1px solid #333; margin-bottom: 10px; }
        #sentence-box { font-size: 26px; color: #00ffcc; min-height: 35px; word-break: break-all; }
        #buffer-box { font-size: 20px; color: #ffcc00; margin-top: 5px; height: 25px; font-weight: bold; letter-spacing: 3px; }
        .predict-bar { display: flex; overflow-x: auto; gap: 15px; padding-bottom: 15px; min-height: 75px; scrollbar-width: none; }
        .predict-item { background: #2c2c2e; padding: 15px 30px; border-radius: 20px; white-space: nowrap; font-size: 24px; border: 2px solid #444; color: #fff; }
        .predict-item.local { border-color: var(--success); color: var(--success); font-weight: bold; }
        .predict-item.ai { border-color: var(--primary); color: var(--primary); }
        .keyboard { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; flex-grow: 1; align-content: start; }
        .key { background: var(--card); border: none; border-radius: 15px; color: white; font-size: 26px; font-weight: bold; height: 60px; display: flex; align-items: center; justify-content: center; box-shadow: 0 3px 0 #000; }
        .key.fn { background: #3a3a3c; font-size: 18px; }
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 15px; }
        .btn { padding: 18px; border-radius: 15px; border: none; font-weight: bold; font-size: 20px; color: white; }
    </style>
</head>
<body>
    <div class="display">
        <div id="sentence-box"></div>
        <div id="buffer-box"></div>
    </div>
    <div id="predict-bar" class="predict-bar"></div>
    <div id="keyboard" class="keyboard"></div>
    <div class="controls">
        <button class="btn" style="background:#3a3a3c" onclick="handleClearAll()">🧹 全清</button>
        <button class="btn" style="background:#0a84ff" onclick="sendAndClear()">✅ 傳送</button>
    </div>

<script>
    // ⚠️ 請填寫您最新的 ngrok 網址
    const BACKEND_URL = "https://frida-bowllike-retrogradingly.ngrok-free.dev/api/predict";
    const bpmf = ["ㄅ","ㄆ","ㄇ","ㄈ","ㄉ","ㄊ","ㄋ","ㄌ","ㄍ","ㄎ","ㄏ","ㄐ","ㄑ","ㄒ","ㄓ","ㄔ","ㄕ","ㄖ","ㄗ","ㄘ","ㄙ","ㄧ","ㄨ","ㄩ","ㄚ","ㄛ","ㄜ","ㄝ","ㄞ","ㄟ","ㄠ","ㄡ","ㄢ","ㄣ","ㄤ","ㄥ","ㄦ"];
    
    // 全部資料鎖死
    const localDict = { "ㄒㄅ": "想小便🚽", "ㄉㄅ": "想大便💩", "ㄏㄕ": "喝水💧", "ㄅㄕ": "報時🕰️", "ㄐㄐ": "緊急🚨", "ㄉㄉ": "對對對對" };
    const nextFlow = {
        "想大便": ["肚子很痛", "快一點", "要換尿布", "我便秘了"],
        "想小便": ["憋不住了", "要尿壺", "快幫我", "。"],
        "喝水": ["我要溫的", "還要喝", "太燙了", "謝謝"],
        "緊急": ["我不舒服", "救救我", "幫我叫醫生"],
        "我不舒服": ["我頭很痛", "我肚子痛", "我喘不過氣"]
    };
    const defaultNeeds = ["緊急🚨", "想小便🚽", "想大便💩", "喝水💧", "報時🕰️", "早安☀️"];

    let sentence = "", inputBuffer = "";

    function renderKB() {
        const kb = document.getElementById('keyboard');
        kb.innerHTML = "";
        bpmf.forEach(c => {
            const btn = document.createElement('button'); btn.className = 'key'; btn.innerText = c;
            btn.onclick = () => { inputBuffer += c; updateUI(); callAI(); };
            kb.appendChild(btn);
        });
        addKey(" ", () => { inputBuffer += " "; updateUI(); }, "key fn");
        addKey("⌫", () => { inputBuffer = inputBuffer.slice(0,-1); updateUI(); callAI(); }, "key fn");
        updatePredicts(defaultNeeds, "local");
    }

    function addKey(txt, fn, cls) {
        const btn = document.createElement('button'); btn.className = cls; btn.innerText = txt; btn.onclick = fn;
        document.getElementById('keyboard').appendChild(btn);
    }

    function updateUI() {
        document.getElementById('buffer-box').innerText = inputBuffer;
        document.getElementById('sentence-box').innerText = sentence;
        if (inputBuffer !== "") {
            let list = localDict[inputBuffer] ? [localDict[inputBuffer]] : [];
            if (list.length > 0) updatePredicts(list, "local");
        }
    }

    async function callAI() {
        if (inputBuffer.length < 2) return;
        try {
            const res = await fetch(BACKEND_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ initials: inputBuffer, context: sentence })
            });
            const data = await res.json();
            if (inputBuffer !== "") updatePredicts(data.choices, "ai");
        } catch (e) { console.log("AI Offline"); }
    }

    function updatePredicts(list, type) {
        const bar = document.getElementById('predict-bar');
        if (type === "local" || bar.innerHTML === "") bar.innerHTML = "";
        list.forEach(word => {
            const d = document.createElement('div');
            d.className = `predict-item ${type === 'local' ? 'local' : 'ai'}`;
            d.innerText = word;
            d.onclick = () => {
                let final = word.replace(/[🚨💧💩🚽🕰️☀️]/g, "");
                // 魏先生指定的日期格式
                if (final === "報時") {
                    const now = new Date();
                    const days = ["週日", "週一", "週二", "週三", "週四", "週五", "週六"];
                    final = `${now.getFullYear()}/${now.getMonth()+1}/${now.getDate()} (${days[now.getDay()]}) ${now.getHours()}:${String(now.getMinutes()).padStart(2, '0')} `;
                }
                sentence += final;
                inputBuffer = "";
                updateUI();
                updatePredicts(nextFlow[final] || defaultNeeds, "local");
            };
            bar.appendChild(d);
        });
    }

    function handleClearAll() { sentence = ""; inputBuffer = ""; updateUI(); updatePredicts(defaultNeeds, "local"); }
    function sendAndClear() { if (sentence.trim()) alert("已發送: " + sentence); handleClearAll(); }

    renderKB();
</script>
</body>
</html>
