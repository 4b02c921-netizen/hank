<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HMI 智慧語句串接系統 V17</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        :root { --bg: #000; --card: #1c1c1e; --primary: #0a84ff; --success: #30d158; --danger: #ff453a; --warm: #ff9f0a; --text: #fff; --dim: #8e8e93; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 8px; height: 100vh; display: flex; flex-direction: column; box-sizing: border-box; overflow: hidden; }
        
        .metrics { display: flex; justify-content: space-between; font-size: 12px; color: var(--dim); padding-bottom: 5px; }
        .display { background: var(--card); padding: 12px; border-radius: 12px; border: 1px solid #333; margin-bottom: 8px; }
        #sentence-box { font-size: 26px; color: #00ffcc; min-height: 32px; word-break: break-all; }
        #buffer-box { font-size: 18px; color: #ffcc00; margin-top: 4px; height: 20px; font-weight: bold; }

        /* 預測列：V17 強化版，按鈕更寬更好點 */
        .predict-bar { display: flex; overflow-x: auto; gap: 12px; padding: 5px 0 15px 0; min-height: 70px; scrollbar-width: none; }
        .predict-bar::-webkit-scrollbar { display: none; }
        .predict-item { background: #2c2c2e; padding: 14px 28px; border-radius: 18px; white-space: nowrap; font-size: 24px; border: 2px solid #444; color: #fff; }
        .predict-item.flow { border-color: var(--primary); color: var(--primary); font-weight: bold; }
        .predict-item.emergency { border-color: var(--danger); color: var(--danger); }

        /* 5 欄位大按鈕鍵盤 */
        .keyboard { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; flex-grow: 1; align-content: start; }
        .key { background: var(--card); border: none; border-radius: 12px; color: white; font-size: 24px; font-weight: bold; height: 60px; display: flex; align-items: center; justify-content: center; }
        .key:active { background: var(--primary); transform: scale(0.92); }
        .key.del { background: #3a3a3c; color: var(--danger); font-size: 18px; }
        .key.clr { background: #3a3a3c; color: var(--warm); font-size: 18px; }

        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .ctrl-btn { padding: 15px; border-radius: 12px; border: none; font-weight: bold; font-size: 18px; color: white; }
        .btn-v { background: var(--danger); }
        .btn-s { background: var(--primary); }
    </style>
</head>
<body>
    <div class="metrics">
        <span id="wpm">速度: 0 字/分</span>
        <span id="status">模式: 語句串接 V17</span>
    </div>
    <div class="display">
        <div id="sentence-box"></div>
        <div id="buffer-box"></div>
    </div>
    <div id="predict-bar" class="predict-bar"></div>
    <div id="keyboard" class="keyboard"></div>
    <div class="controls">
        <button class="ctrl-btn btn-v" onclick="startVoice()">🎤 語音輸入</button>
        <button class="ctrl-btn btn-s" onclick="sendAndClear()">✅ 傳送</button>
    </div>

<script>
    const bpmf = ["ㄅ","ㄆ","ㄇ","ㄈ","ㄉ","ㄊ","ㄋ","ㄌ","ㄍ","ㄎ","ㄏ","ㄐ","ㄑ","ㄒ","ㄓ","ㄔ","ㄕ","ㄖ","ㄗ","ㄘ","ㄙ","ㄧ","ㄨ","ㄩ","ㄚ","ㄛ","ㄜ","ㄝ","ㄞ","ㄟ","ㄠ","ㄡ","ㄢ","ㄣ","ㄤ","ㄥ","ㄦ"];
    
    // 1. 基礎聲母對應
    const dictionary = [
        {w: "早安", s: "ㄗㄢ"}, {w: "你好", s: "ㄋㄏ"}, {w: "謝謝", s: "ㄒㄒ"},
        {w: "喝水", s: "ㄏㄕ"}, {w: "想大便", s: "ㄉㄅ"}, {w: "想小便", s: "ㄒㄅ"},
        {w: "緊急", s: "ㄐㄐ"}, {w: "救命", s: "ㄐㄇ"}, {w: "報時", s: "ㄅㄕ"}
    ];

    // 2. V17 深度語句串接鏈 (Sentence Builder)
    const sentenceChains = {
        "早安": ["要喝水嗎？", "心情好嗎？", "吃飽沒", "。"],
        "喝水": ["還要", "調水溫", "太燙了", "。"],
        "還要": ["一點點", "大口一點", "溫一點", "太熱了", "。"],
        "調水溫": ["熱一點", "冷一點", "溫水", "剛剛好", "謝謝"],
        "太燙了": ["幫我吹吹", "加冷水", "等一下再喝", "。"],
        "想大便": ["肚子痛", "快一點", "要換尿布", "不舒服", "。"],
        "想小便": ["很急", "快點", "要尿壺", "。"],
        "緊急": ["我不舒服", "救救我", "快叫人", "找醫生", "🚨"],
        "心情好嗎？": ["很好", "普通", "累累的", "不太好"],
        "謝謝": ["不客氣", "。"]
    };

    const lifeSafe = ["緊急🚨", "喝水💧", "大便💩", "小便🚽", "報時🕰️", "早安☀️"];

    let sentence = "", inputBuffer = "", startTime = null, wordCount = 0;

    function renderKB() {
        const kb = document.getElementById('keyboard');
        kb.innerHTML = "";
        bpmf.forEach(c => {
            const btn = document.createElement('button');
            btn.className = 'key'; btn.innerText = c;
            btn.onclick = () => {
                if (!startTime) startTime = new Date();
                inputBuffer += c;
                document.getElementById('buffer-box').innerText = inputBuffer;
                updatePredicts();
            };
            kb.appendChild(btn);
        });
        createKey(" ", () => { inputBuffer += " "; updatePredicts(); }, "key");
        createKey("⌫ 刪除", handleDelete, "key del");
        createKey("🧹 全清", handleClearAll, "key clr");
        updatePredicts();
    }

    function createKey(txt, onclick, cls) {
        const btn = document.createElement('button');
        btn.className = cls; btn.innerText = txt; btn.onclick = onclick;
        document.getElementById('keyboard').appendChild(btn);
    }

    // 核心邏輯：遞歸式語句串接
    function updatePredicts(customList = null) {
        const bar = document.getElementById('predict-bar');
        bar.innerHTML = "";
        let list = [];

        if (customList) {
            list = customList;
        } else if (inputBuffer !== "") {
            // 搜尋匹配聲母的詞
            list = dictionary.filter(item => item.s.startsWith(inputBuffer)).map(item => item.w);
            if (list.length === 0) list = lifeSafe;
        } else {
            // 抓句子最後兩個字進行鏈接預測
            const lastWord = sentence.slice(-2);
            const last4 = sentence.slice(-4);
            list = sentenceChains[last4] || sentenceChains[lastWord] || lifeSafe;
        }

        list.forEach(word => {
            const d = document.createElement('div');
            d.className = 'predict-item';
            // 標記這是一個「可繼續串接」的詞
            if (sentenceChains[word]) d.classList.add('flow');
            if (word.includes("緊急") || word.includes("救")) d.classList.add('emergency');
            
            d.innerText = word;
            d.onclick = () => {
                let final = word.replace(/[🚨💧💩🚽🕰️☀️]/g, "");
                
                // 智慧報時
                if (final === "報時") {
                    const now = new Date();
                    const days = ['日', '一', '二', '三', '四', '五', '六'];
                    final = `${now.getMonth()+1}/${now.getDate()}(${days[now.getDay()]}) ${now.getHours()}:${String(now.getMinutes()).padStart(2, '0')} `;
                }

                sentence += final;
                wordCount += final.length;
                document.getElementById('sentence-box').innerText = sentence;
                inputBuffer = "";
                document.getElementById('buffer-box').innerText = "";
                updateWPM();
                
                // --- 關鍵：自動抓取下一個串接清單，讓動作連貫 ---
                const nextChain = sentenceChains[final];
                updatePredicts(nextChain); 
            };
            bar.appendChild(d);
        });
    }

    function updateWPM() {
        if (!startTime) return;
        const mins = (new Date() - startTime) / 60000;
        document.getElementById('wpm').innerText = `速度: ${Math.round(wordCount / mins) || 0} 字/分`;
    }

    function handleClearAll() {
        sentence = ""; inputBuffer = ""; wordCount = 0; startTime = null;
        document.getElementById('sentence-box').innerText = "";
        document.getElementById('buffer-box').innerText = "";
        updatePredicts();
    }

    function handleDelete() {
        if (inputBuffer.length > 0) {
            inputBuffer = inputBuffer.slice(0, -1);
            document.getElementById('buffer-box').innerText = inputBuffer;
        } else {
            sentence = sentence.slice(0, -1);
            document.getElementById('sentence-box').innerText = sentence;
        }
        updatePredicts();
    }

    function sendAndClear() {
        if (sentence.trim() && liff.isInClient()) liff.sendMessages([{ type: 'text', text: `【HMI】: ${sentence}` }]);
        handleClearAll();
    }

    function startVoice() {
        const sr = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        sr.lang = 'zh-TW';
        sr.onresult = (e) => { sentence += e.results[0][0].transcript; updatePredicts(); };
        sr.start();
    }

    liff.init({ liffId: "2009598618-mYOYGEoM" }).then(renderKB);
</script>
</body>
</html>
