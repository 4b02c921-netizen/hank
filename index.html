<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HMI 肢障友善輸入系統</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        :root {
            --bg: #000; --card: #1c1c1e; --primary: #0a84ff;
            --success: #30d158; --text: #fff; --dim: #8e8e93;
        }

        body {
            font-family: sans-serif; background: var(--bg); color: var(--text);
            margin: 0; padding: 8px; height: 100vh;
            display: flex; flex-direction: column; box-sizing: border-box;
        }

        /* 頂部數據監測：科研對照用 */
        .metrics { display: flex; justify-content: space-between; font-size: 12px; color: var(--dim); margin-bottom: 5px; }

        /* 句子顯示區：字體加大方便閱讀 */
        .display { background: var(--card); padding: 15px; border-radius: 12px; border: 1px solid #333; margin-bottom: 8px; }
        #sentence-box { font-size: 26px; color: #00ffcc; min-height: 32px; word-break: break-all; }
        #buffer-box { font-size: 16px; color: var(--dim); margin-top: 4px; height: 20px; font-weight: bold; }

        /* AI 預測區：加大按鈕高度，方便肢障使用者點選 */
        .predict-bar {
            display: flex; overflow-x: auto; gap: 10px; padding: 5px 0 12px 0;
            min-height: 50px; scrollbar-width: none;
        }
        .predict-bar::-webkit-scrollbar { display: none; }
        .predict-item {
            background: #2c2c2e; padding: 10px 20px; border-radius: 15px;
            white-space: nowrap; font-size: 20px; border: 2px solid #444; color: #fff;
        }
        .predict-item.history { border-color: var(--success); color: var(--success); font-weight: bold; }

        /* 核心：5 欄位佈局 (兼顧一屏化與大面積點擊) */
        .keyboard {
            display: grid;
            grid-template-columns: repeat(5, 1fr); 
            gap: 8px;
            flex-grow: 1;
            align-content: start;
        }
        .key {
            background: var(--card); border: none; border-radius: 10px;
            color: white; font-size: 24px; font-weight: bold;
            height: 70px; /* 固定高度，確保點擊面積充足 */
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 3px 0 #000;
        }
        .key:active { background: var(--primary); transform: translateY(2px); box-shadow: none; }

        /* 控制按鈕 */
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; padding-bottom: 5px; }
        .ctrl-btn { padding: 15px; border-radius: 12px; border: none; font-weight: bold; font-size: 18px; cursor: pointer; color: white; }
        .btn-v { background: #ff453a; }
        .btn-s { background: var(--primary); }
    </style>
</head>
<body>

    <div class="metrics">
        <span id="wpm">速度: 0 字/分</span>
        <span id="status">模式: 5x8 友善佈局</span>
    </div>

    <div class="display">
        <div id="sentence-box"></div>
        <div id="buffer-box"></div>
    </div>

    <div class="predict-bar" id="predict-bar">
        </div>

    <div class="keyboard" id="keyboard"></div>

    <div class="controls">
        <button class="ctrl-btn btn-v" onclick="startVoice()">🎤 語音輸入</button>
        <button class="ctrl-btn btn-s" onclick="sendAndClear()">✅ 學習並傳送</button>
    </div>

<script>
    const LIFF_ID = "2009598618-mYOYGEoM";
    const bpmf = ["ㄅ","ㄆ","ㄇ","ㄈ","ㄉ","ㄊ","ㄋ","ㄌ","ㄍ","ㄎ","ㄏ","ㄐ","ㄑ","ㄒ","ㄓ","ㄔ","ㄕ","ㄖ","ㄗ","ㄘ","ㄙ","ㄧ","ㄨ","ㄩ","ㄚ","ㄛ","ㄜ","ㄝ","ㄞ","ㄟ","ㄠ","ㄡ","ㄢ","ㄣ","ㄤ","ㄥ","ㄦ"];
    
    // 擴充詞庫：確保「ㄋㄏ」能跑出「你好」
    const aiLib = {
        "ㄋㄏ": ["你好", "您好", "哪會", "內湖"],
        "ㄐㄐ": ["緊急", "救命", "姐姐", "解決"],
        "ㄉㄅ": ["大便", "翻身", "代表", "對吧"],
        "ㄒㄒ": ["謝謝", "休息", "學習", "學校"],
        "ㄏㄕ": ["喝水", "好事", "還是", "回家"],
        "ㄋㄋ": ["牛奶", "奶奶", "內內"]
    };

    let sentence = "", inputBuffer = "", startTime = null, wordCount = 0;

    // 靜音學習邏輯
    function learn(ini, word) {
        if (!ini || !word) return;
        let h = JSON.parse(localStorage.getItem('hmi_v4') || '{}');
        h[ini] = [word, ...((h[ini] || []).filter(w => w !== word))].slice(0, 5);
        localStorage.setItem('hmi_v4', JSON.stringify(h));
    }

    function renderKB() {
        const kb = document.getElementById('keyboard');
        kb.innerHTML = "";
        bpmf.forEach(char => {
            const btn = document.createElement('button');
            btn.className = 'key';
            btn.innerText = char;
            btn.onclick = () => {
                if (!startTime) startTime = new Date();
                inputBuffer += char;
                document.getElementById('buffer-box').innerText = inputBuffer;
                updatePredicts();
            };
            kb.appendChild(btn);
        });
    }

    function updatePredicts() {
        const bar = document.getElementById('predict-bar');
        bar.innerHTML = "";
        const history = JSON.parse(localStorage.getItem('hmi_v4') || '{}')[inputBuffer] || [];
        const defaults = aiLib[inputBuffer] || ["然後", "好的", "想你"];
        const list = [...new Set([...history, ...defaults])];

        list.forEach(word => {
            const d = document.createElement('div');
            d.className = `predict-item ${history.includes(word) ? 'history' : ''}`;
            d.innerText = word;
            d.onclick = () => {
                learn(inputBuffer, word);
                sentence += word; wordCount += word.length;
                document.getElementById('sentence-box').innerText = sentence;
                inputBuffer = ""; document.getElementById('buffer-box').innerText = "";
                bar.innerHTML = "";
                updateWPM();
            };
            bar.appendChild(d);
        });
    }

    function updateWPM() {
        if (!startTime) return;
        const mins = (new Date() - startTime) / 60000;
        document.getElementById('wpm').innerText = `速度: ${Math.round(wordCount / mins) || 0} 字/分`;
    }

    function sendAndClear() {
        if (sentence.trim() && liff.isInClient()) {
            liff.sendMessages([{ type: 'text', text: `【HMI】: ${sentence}` }]);
        }
        sentence = ""; inputBuffer = ""; wordCount = 0; startTime = null;
        document.getElementById('sentence-box').innerText = "";
        document.getElementById('buffer-box').innerText = "";
        renderKB();
    }

    function startVoice() {
        const sr = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        sr.lang = 'zh-TW';
        sr.onresult = (e) => { 
            const res = e.results[0][0].transcript;
            sentence += res; 
            document.getElementById('sentence-box').innerText = sentence; 
        };
        sr.start();
    }

    liff.init({ liffId: LIFF_ID }).then(renderKB);
</script>
</body>
</html>
