<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HMI 終極收官版 V39</title>
    <style>
        :root { --bg: #000; --card: #1c1c1e; --primary: #0a84ff; --success: #30d158; --danger: #ff453a; --text: #fff; --dim: #8e8e93; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; box-sizing: border-box; display: flex; flex-direction: column; height: 100vh; }
        .display { background: var(--card); padding: 15px; border-radius: 12px; border: 1px solid #333; margin-bottom: 8px; flex-shrink: 0; }
        #sentence-box { font-size: 26px; color: #00ffcc; min-height: 35px; word-break: break-all; }
        #buffer-box { font-size: 20px; color: #ffcc00; margin-top: 5px; font-weight: bold; }
        .predict-bar { display: flex; overflow-x: auto; gap: 12px; padding-bottom: 10px; min-height: 75px; scrollbar-width: none; }
        .predict-item { background: #2c2c2e; padding: 12px 24px; border-radius: 18px; white-space: nowrap; font-size: 22px; border: 2px solid #444; color: #fff; }
        .predict-item.local { border-color: var(--success); color: var(--success); }
        .predict-item.ai { border-color: var(--primary); color: var(--primary); }
        .keyboard { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; flex-grow: 1; align-content: start; }
        .key { background: var(--card); border: none; border-radius: 12px; color: white; font-size: 24px; font-weight: bold; height: 50px; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 0 #000; }
        .key.fn { background: #3a3a3c; font-size: 18px; }
        .record-panel { background: #111; border-top: 2px solid #333; margin-top: 10px; padding: 10px; border-radius: 12px; flex-shrink: 0; }
        .record-content { font-size: 13px; color: #888; max-height: 80px; overflow-y: auto; background: #000; padding: 8px; border-radius: 8px; }
    </style>
</head>
<body>
    <div class="display">
        <div id="sentence-box"></div>
        <div id="buffer-box"></div>
    </div>
    <div id="predict-bar" class="predict-bar"></div>
    <div id="keyboard" class="keyboard"></div>
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:10px;">
        <button onclick="handleClearAll()" style="background:#3a3a3c; color:white; border-radius:12px; padding:15px; border:none; font-size:18px;">🧹 全清</button>
        <button onclick="sendAndClear()" style="background:#0a84ff; color:white; border-radius:12px; padding:15px; border:none; font-size:18px;">✅ 傳送</button>
    </div>
    <div class="record-panel">
        <div style="color:var(--success); font-weight:bold; font-size:14px; margin-bottom:5px;">📊 科研發送紀錄</div>
        <div class="record-content" id="log-display">尚未有發送紀錄...</div>
    </div>

<script>
    const BACKEND_URL = "https://frida-bowllike-retrogradingly.ngrok-free.dev/api/predict";
    const bpmf = ["ㄅ","ㄆ","ㄇ","ㄈ","ㄉ","ㄊ","ㄋ","ㄌ","ㄍ","ㄎ","ㄏ","ㄐ","ㄑ","ㄒ","ㄓ","ㄔ","ㄕ","ㄖ","ㄗ","ㄘ","ㄙ","ㄧ","ㄨ","ㄩ","ㄚ","ㄛ","ㄜ","ㄝ","ㄞ","ㄟ","ㄠ","ㄡ","ㄢ","ㄣ","ㄤ","ㄥ","ㄦ"];
    const localDict = { "ㄒㄅ": "想小便🚽", "ㄉㄅ": "想大便💩", "ㄏㄕ": "喝水💧", "ㄅㄕ": "報時🕰️", "ㄐㄐ": "緊急🚨" };
    const nextFlow = {
        "想大便": ["肚子很痛", "快一點", "要換尿布"], "想小便": ["憋不住了", "拿尿壺", "快幫我"],
        "喝水": ["我要溫的", "還要喝", "太燙了"]
    };
    const defaultNeeds = ["緊急🚨", "想小便🚽", "想大便💩", "喝水💧", "報時🕰️", "早安☀️"];
    let sentence = "", inputBuffer = "";

    function renderKB() {
        const kb = document.getElementById('keyboard');
        kb.innerHTML = "";
        bpmf.forEach(c => {
            const btn = document.createElement('button'); btn.className = 'key'; btn.innerText = c;
            btn.onclick = () => { inputBuffer += c; updateUI(); callAI(); };
            kb.appendChild(btn);
        });
        addKey(" ", () => { inputBuffer += " "; updateUI(); }, "key fn");
        addKey("⌫", () => { inputBuffer = inputBuffer.slice(0,-1); updateUI(); callAI(); }, "key fn");
        updatePredicts(defaultNeeds, "local");
    }

    function addKey(txt, fn, cls) {
        const btn = document.createElement('button'); btn.className = cls; btn.innerText = txt; btn.onclick = fn;
        document.getElementById('keyboard').appendChild(btn);
    }

    function updateUI() {
        document.getElementById('buffer-box').innerText = inputBuffer;
        document.getElementById('sentence-box').innerText = sentence;
        // 如果正在打字，清空預測列，等待 AI
        if (inputBuffer !== "") {
            document.getElementById('predict-bar').innerHTML = "";
            if (localDict[inputBuffer]) updatePredicts([localDict[inputBuffer]], "local");
        }
    }

    async function callAI() {
        if (inputBuffer.length < 2) {
            if (inputBuffer === "") updatePredicts(defaultNeeds, "local");
            return;
        }
        try {
            const res = await fetch(BACKEND_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ initials: inputBuffer, context: sentence })
            });
            const data = await res.json();
            if (inputBuffer !== "") updatePredicts(data.choices, "ai");
        } catch (e) { }
    }

    function updatePredicts(list, type) {
        const bar = document.getElementById('predict-bar');
        // 打字時 (inputBuffer有值)，強制只顯示 AI 或對應的單一 local 詞，隱藏預設綠色按鈕
        if (inputBuffer !== "" || type === "local") bar.innerHTML = "";
        list.forEach(word => {
            const d = document.createElement('div');
            d.className = `predict-item ${type}`;
            d.innerText = word;
            d.onclick = () => {
                let final = word.replace(/[🚨💧💩🚽🕰️☀️]/g, "");
                if (final === "報時") {
                    const now = new Date();
                    const days = ["週日", "週一", "週二", "週三", "週四", "週五", "週六"];
                    final = `${now.getFullYear()}/${now.getMonth()+1}/${now.getDate()} (${days[now.getDay()]}) ${now.getHours()}:${String(now.getMinutes()).padStart(2, '0')} `;
                }
                sentence += final;
                inputBuffer = "";
                updateUI();
                updatePredicts(nextFlow[final] || defaultNeeds, "local");
            };
            bar.appendChild(d);
        });
    }

    function handleClearAll() { sentence = ""; inputBuffer = ""; updateUI(); updatePredicts(defaultNeeds, "local"); }
    
    function sendAndClear() {
        if (sentence.trim()) {
            const now = new Date();
            const logBox = document.getElementById('log-display');
            const timeStr = `${now.getHours()}:${String(now.getMinutes()).padStart(2, '0')}`;
            if (logBox.innerText.includes("尚未有")) logBox.innerHTML = "";
            logBox.innerHTML = `<div>[${timeStr}] ${sentence}</div>` + logBox.innerHTML;
        }
        handleClearAll();
    }
    renderKB();
</script>
</body>
</html>
