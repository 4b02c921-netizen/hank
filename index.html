<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HMI 肢障友善科研系統 V5</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        :root { --bg: #000; --card: #1c1c1e; --primary: #0a84ff; --success: #30d158; --text: #fff; --dim: #8e8e93; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 8px; height: 100vh; display: flex; flex-direction: column; box-sizing: border-box; overflow: hidden; }
        
        .metrics { display: flex; justify-content: space-between; font-size: 12px; color: var(--dim); padding-bottom: 5px; }
        .display { background: var(--card); padding: 15px; border-radius: 12px; border: 1px solid #333; margin-bottom: 8px; }
        #sentence-box { font-size: 26px; color: #00ffcc; min-height: 32px; word-break: break-all; }
        #buffer-box { font-size: 16px; color: var(--dim); margin-top: 4px; height: 20px; font-weight: bold; }

        /* 預測列：加大面積 */
        .predict-bar { display: flex; overflow-x: auto; gap: 10px; padding: 5px 0 12px 0; min-height: 55px; scrollbar-width: none; }
        .predict-bar::-webkit-scrollbar { display: none; }
        .predict-item { background: #2c2c2e; padding: 12px 24px; border-radius: 15px; white-space: nowrap; font-size: 22px; border: 2px solid #444; color: #fff; }
        .predict-item.history { border-color: var(--success); color: var(--success); }

        /* 5 欄位佈局：適合輕度肢障操作 */
        .keyboard { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; flex-grow: 1; align-content: start; }
        .key { background: var(--card); border: none; border-radius: 10px; color: white; font-size: 24px; font-weight: bold; height: 65px; display: flex; align-items: center; justify-content: center; }
        .key:active { background: var(--primary); transform: scale(0.95); }

        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .ctrl-btn { padding: 15px; border-radius: 12px; border: none; font-weight: bold; font-size: 18px; cursor: pointer; color: white; }
        .btn-v { background: #ff453a; }
        .btn-s { background: var(--primary); }
    </style>
</head>
<body>

    <div class="metrics">
        <span id="wpm">速度: 0 字/分</span>
        <span id="status">模式: 肢障科研 V5</span>
    </div>

    <div class="display">
        <div id="sentence-box"></div>
        <div id="buffer-box"></div>
    </div>

    <div id="predict-bar" class="predict-bar"></div>

    <div id="keyboard" class="keyboard"></div>

    <div class="controls">
        <button class="ctrl-btn btn-v" onclick="startVoice()">🎤 語音輸入</button>
        <button class="ctrl-btn btn-s" onclick="sendAndClear()">✅ 傳送</button>
    </div>

<script>
    const LIFF_ID = "2009598618-mYOYGEoM";
    const bpmf = ["ㄅ","ㄆ","ㄇ","ㄈ","ㄉ","ㄊ","ㄋ","ㄌ","ㄍ","ㄎ","ㄏ","ㄐ","ㄑ","ㄒ","ㄓ","ㄔ","ㄕ","ㄖ","ㄗ","ㄘ","ㄙ","ㄧ","ㄨ","ㄩ","ㄚ","ㄛ","ㄜ","ㄝ","ㄞ","ㄟ","ㄠ","ㄡ","ㄢ","ㄣ","ㄤ","ㄥ","ㄦ"];
    
    // 補強詞庫
    const aiLib = {
        "ㄗㄢ": ["早安", "咱們", "讚", "暫"],
        "ㄨㄢ": ["晚安", "玩", "完"],
        "ㄋㄏ": ["你好", "您好", "哪會"],
        "ㄒㄒ": ["謝謝", "休息", "學習"],
        "ㄏㄕ": ["喝水", "還是", "回家"],
        "ㄉㄅ": ["大便", "代表", "翻身"],
        "ㄐㄐ": ["緊急", "救命", "姐姐"]
    };

    // AI Agent 下一詞聯想
    const nextWordLib = {
        "早安": ["您好", "吃飽沒", "。"],
        "晚安": ["祝好夢", "。"],
        "你好": ["嗎", "最近好嗎", "謝謝"],
        "謝謝": ["不客氣", "好的"],
        "喝水": ["嗎", "謝謝", "還要"]
    };

    let sentence = "", inputBuffer = "", startTime = null, wordCount = 0;

    function learn(ini, word) {
        if (!ini || !word) return;
        let h = JSON.parse(localStorage.getItem('hmi_v5_mem') || '{}');
        h[ini] = [word, ...((h[ini] || []).filter(w => w !== word))].slice(0, 5);
        localStorage.setItem('hmi_v5_mem', JSON.stringify(h));
    }

    function renderKB() {
        const kb = document.getElementById('keyboard');
        kb.innerHTML = "";
        bpmf.forEach(char => {
            const btn = document.createElement('button');
            btn.className = 'key';
            btn.innerText = char;
            btn.onclick = () => {
                if (!startTime) startTime = new Date();
                inputBuffer += char;
                document.getElementById('buffer-box').innerText = inputBuffer;
                updatePredicts();
            };
            kb.appendChild(btn);
        });
    }

    function updatePredicts() {
        const bar = document.getElementById('predict-bar');
        bar.innerHTML = "";
        const history = JSON.parse(localStorage.getItem('hmi_v5_mem') || '{}')[inputBuffer] || [];
        const defaults = aiLib[inputBuffer] || ["然後", "的", "了"];
        const list = [...new Set([...history, ...defaults])];
        list.forEach(word => createPredictItem(word, true));
    }

    function createPredictItem(word, isFromInitials) {
        const bar = document.getElementById('predict-bar');
        const d = document.createElement('div');
        d.className = 'predict-item';
        const history = JSON.parse(localStorage.getItem('hmi_v5_mem') || '{}')[inputBuffer] || [];
        if (isFromInitials && history.includes(word)) d.classList.add('history');
        
        d.innerText = word;
        d.onclick = () => {
            if (isFromInitials) learn(inputBuffer, word);
            sentence += word;
            wordCount += word.length;
            document.getElementById('sentence-box').innerText = sentence;
            inputBuffer = "";
            document.getElementById('buffer-box').innerText = "";
            updateWPM();
            // 切換為下一個詞聯想
            bar.innerHTML = "";
            const suggestions = nextWordLib[word] || ["然後", "的", "。"];
            suggestions.forEach(w => createPredictItem(w, false));
        };
        bar.appendChild(d);
    }

    function updateWPM() {
        if (!startTime) return;
        const mins = (new Date() - startTime) / 60000;
        document.getElementById('wpm').innerText = `速度: ${Math.round(wordCount / mins) || 0} 字/分`;
    }

    function sendAndClear() {
        if (sentence.trim() && liff.isInClient()) {
            liff.sendMessages([{ type: 'text', text: `【HMI】: ${sentence}` }]);
        }
        sentence = ""; inputBuffer = ""; wordCount = 0; startTime = null;
        document.getElementById('sentence-box').innerText = "";
        document.getElementById('buffer-box').innerText = "";
        document.getElementById('predict-bar').innerHTML = "";
        renderKB();
    }

    function startVoice() {
        const sr = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        sr.lang = 'zh-TW';
        sr.onresult = (e) => { 
            const res = e.results[0][0].transcript;
            sentence += res; 
            document.getElementById('sentence-box').innerText = sentence;
        };
        sr.start();
    }

    liff.init({ liffId: LIFF_ID }).then(renderKB);
</script>
</body>
</html>
