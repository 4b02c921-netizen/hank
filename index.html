<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>陳OO 意圖選擇器</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #f8f9fa; padding: 15px; margin: 0; }
        #status { text-align: center; color: #666; margin-bottom: 15px; font-size: 16px; font-weight: bold; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .btn {
            height: 120px; border: none; border-radius: 20px; font-size: 28px; font-weight: bold;
            color: white; box-shadow: 0 6px rgba(0,0,0,0.1); cursor: pointer;
        }
        .btn:active { transform: translateY(2px); box-shadow: 0 2px rgba(0,0,0,0.1); }
        .emergency { background-color: #FF4B4B; }
        .normal { background-color: #4B7BFF; }
        .teach { background-color: #6c757d; grid-column: span 2; height: 80px; font-size: 20px; margin-top: 10px; }
    </style>
</head>
<body>
    <div id="status">正在同步守護系統...</div>
    <div class="grid" id="grid"></div>

    <script>
        const emergencyKeywords = ["緊急", "求救", "救命", "去醫院", "不舒服", "呼吸困難", "跌倒"];

        function renderButtons(options, ini) {
            const gridEl = document.getElementById('grid');
            const statusEl = document.getElementById('status');
            gridEl.innerHTML = "";

            if (options.length === 0) {
                statusEl.innerText = "目前無資料 (測試模式)";
                options = ["測試1", "緊急測試", "喝水", "翻身"];
            } else {
                statusEl.innerText = `聲母「${ini}」的可能意圖：`;
            }

            options.forEach(word => {
                const btn = document.createElement('button');
                btn.innerText = word;
                const isEmergency = emergencyKeywords.some(k => word.includes(k));
                btn.className = isEmergency ? "btn emergency" : "btn normal";
                btn.onclick = () => {
                    if (liff.isInClient()) {
                        liff.sendMessages([{ type: 'text', text: `【確認】：${word}` }])
                            .then(() => liff.closeWindow());
                    } else {
                        alert("偵測到選擇：" + word);
                    }
                };
                gridEl.appendChild(btn);
            });

            // 教學按鈕
            const teachBtn = document.createElement('button');
            teachBtn.innerText = "以上都不是 (教導模式)";
            teachBtn.className = "btn teach";
            teachBtn.onclick = () => {
                if (liff.isInClient()) {
                    liff.sendMessages([{ type: 'text', text: `我不認識「${ini}」，請教我。` }])
                        .then(() => liff.closeWindow());
                }
            };
            gridEl.appendChild(teachBtn);
        }

        async function main() {
            try {
                // 填入您的 LIFF ID
                await liff.init({ liffId: "2009598618-mYOYGEoM" }).catch(() => console.log("Outside LINE"));
                
                if (liff.isInClient() && !liff.isLoggedIn()) {
                    liff.login();
                    return;
                }

                const urlParams = new URLSearchParams(window.location.search);
                const ini = urlParams.get('ini') || "";
                const options = urlParams.get('options')?.split(',') || [];
                
                renderButtons(options, ini);
            } catch (err) {
                document.getElementById('status').innerText = "系統初始化異常";
                renderButtons([], "");
            }
        }
        main();
    </script>
</body>
</html>
