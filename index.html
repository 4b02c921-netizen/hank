<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HMI 標準化系統 V40</title>
    <style>
        :root { --bg: #000; --card: #1c1c1e; --primary: #0a84ff; --success: #30d158; --danger: #ff453a; --text: #fff; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 8px; display: flex; flex-direction: column; height: 100vh; }
        
        /* 顯示區 */
        .display { background: var(--card); padding: 12px; border-radius: 12px; border: 1px solid #333; margin-bottom: 5px; }
        #sentence-box { font-size: 24px; color: #00ffcc; min-height: 32px; word-break: break-all; }
        #buffer-box { font-size: 18px; color: #ffcc00; margin-top: 4px; font-weight: bold; }

        /* 預測列：模仿截圖中的清爽感 */
        .predict-bar { display: flex; overflow-x: auto; gap: 10px; padding: 5px 0 10px 0; min-height: 60px; scrollbar-width: none; }
        .predict-item { background: #2c2c2e; padding: 10px 20px; border-radius: 10px; white-space: nowrap; font-size: 20px; border: 1px solid #444; color: #fff; display: flex; align-items: center; }
        .predict-item.local { border-color: var(--success); color: var(--success); }
        .predict-item.ai { border-color: var(--primary); }

        /* 鍵盤 */
        .keyboard { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; flex-grow: 1; align-content: start; }
        .key { background: var(--card); border: none; border-radius: 10px; color: white; font-size: 22px; font-weight: bold; height: 45px; box-shadow: 0 1px 0 #000; }
        .key.fn { background: #333; font-size: 16px; }

        /* 歷史紀錄區 */
        .history-panel { background: #111; border-top: 1px solid #333; padding: 10px; border-radius: 10px 10px 0 0; margin-top: 5px; }
        .history-title { color: var(--success); font-size: 12px; font-weight: bold; margin-bottom: 5px; }
        .history-list { font-size: 13px; color: #888; max-height: 60px; overflow-y: auto; line-height: 1.4; }
    </style>
</head>
<body>
    <div class="display">
        <div id="sentence-box"></div>
        <div id="buffer-box"></div>
    </div>
    
    <div id="predict-bar" class="predict-bar"></div>
    
    <div id="keyboard" class="keyboard"></div>

    <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:10px;">
        <button onclick="handleClearAll()" style="background:#333; color:white; border-radius:10px; padding:12px; border:none;">全清</button>
        <button onclick="sendAndClear()" style="background:var(--primary); color:white; border-radius:10px; padding:12px; border:none; font-weight:bold;">✅ 傳送</button>
    </div>

    <div class="history-panel">
        <div class="history-title">📊 最近發送紀錄</div>
        <div class="history-list" id="history-box">尚無紀錄</div>
    </div>

<script>
    const BACKEND_URL = "https://frida-bowllike-retrogradingly.ngrok-free.dev/api/predict";
    const bpmf = ["ㄅ","ㄆ","ㄇ","ㄈ","ㄉ","ㄊ","ㄋ","ㄌ","ㄍ","ㄎ","ㄏ","ㄐ","ㄑ","ㄒ","ㄓ","ㄔ","ㄕ","ㄖ","ㄗ","ㄘ","ㄙ","ㄧ","ㄨ","ㄩ","ㄚ","ㄛ","ㄜ","ㄝ","ㄞ","ㄟ","ㄠ","ㄡ","ㄢ","ㄣ","ㄤ","ㄥ","ㄦ"];
    
    // 1. 生理需求固定按鈕 (平常顯示，打字時消失)
    const defaults = ["緊急🚨", "想小便🚽", "想大便💩", "喝水💧", "報時🕰️", "早安☀️"];
    const flowMap = {
        "想大便": ["肚子痛", "快一點", "換尿布"], 
        "想小便": ["憋不住", "拿尿壺", "快幫我"],
        "喝水": ["要溫的", "還要喝", "太燙了"]
    };

    let sentence = "", inputBuffer = "";

    function renderKB() {
        const kb = document.getElementById('keyboard');
        kb.innerHTML = "";
        bpmf.forEach(c => {
            const btn = document.createElement('button'); btn.className = 'key'; btn.innerText = c;
            btn.onclick = () => { inputBuffer += c; updateUI(); callAI(); };
            kb.appendChild(btn);
        });
        addKey(" ", () => { inputBuffer += " "; updateUI(); }, "key fn");
        addKey("⌫", () => { inputBuffer = inputBuffer.slice(0,-1); updateUI(); callAI(); }, "key fn");
        updatePredicts(defaults, "local");
        loadHistory();
    }

    function addKey(txt, fn, cls) {
        const btn = document.createElement('button'); btn.className = cls; btn.innerText = txt; btn.onclick = fn;
        document.getElementById('keyboard').appendChild(btn);
    }

    function updateUI() {
        document.getElementById('buffer-box').innerText = inputBuffer;
        document.getElementById('sentence-box').innerText = sentence;
        // 關鍵：如果正在打字，立刻隱藏綠色功能鍵
        if (inputBuffer !== "") {
            document.getElementById('predict-bar').innerHTML = ""; 
        }
    }

    async function callAI() {
        if (inputBuffer.length < 2) {
            if (inputBuffer === "") updatePredicts(defaults, "local");
            return;
        }
        try {
            const res = await fetch(BACKEND_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ initials: inputBuffer })
            });
            const data = await res.json();
            if (inputBuffer !== "") updatePredicts(data.choices, "ai");
        } catch (e) { }
    }

    function updatePredicts(list, type) {
        const bar = document.getElementById('predict-bar');
        // 只有在空緩衝區或顯式要求時才清空，確保打字時綠色鍵不會混進來
        if (inputBuffer !== "" || type === "local") bar.innerHTML = "";
        
        list.forEach(word => {
            const d = document.createElement('div');
            d.className = `predict-item ${type}`;
            d.innerText = word;
            d.onclick = () => {
                let final = word.replace(/[🚨💧💩🚽🕰️☀️]/g, "");
                
                // 完整日期報時
                if (final === "報時") {
                    const now = new Date();
                    const days = ["週日", "週一", "週二", "週三", "週四", "週五", "週六"];
                    final = `${now.getFullYear()}/${now.getMonth()+1}/${now.getDate()} (${days[now.getDay()]}) ${now.getHours()}:${String(now.getMinutes()).padStart(2, '0')} `;
                }
                
                sentence += final;
                inputBuffer = "";
                updateUI();
                // 點完後，如果有後續動作(接龍)就顯示，否則回歸預設
                updatePredicts(flowMap[final] || defaults, "local");
            };
            bar.appendChild(d);
        });
    }

    function handleClearAll() { sentence = ""; inputBuffer = ""; updateUI(); updatePredicts(defaults, "local"); }
    
    function sendAndClear() {
        if (sentence.trim()) {
            const now = new Date();
            const timeStr = `${now.getHours()}:${String(now.getMinutes()).padStart(2, '0')}`;
            const log = `[${timeStr}] ${sentence}`;
            
            // 存入 LocalStorage 紀錄歷史
            let hist = JSON.parse(localStorage.getItem('hmi_history') || '[]');
            hist.unshift(log);
            localStorage.setItem('hmi_history', JSON.stringify(hist.slice(0, 10)));
            loadHistory();
        }
        handleClearAll();
    }

    function loadHistory() {
        const hist = JSON.parse(localStorage.getItem('hmi_history') || '[]');
        document.getElementById('history-box').innerHTML = hist.length ? hist.join('<br>') : "尚無紀錄";
    }

    renderKB();
</script>
</body>
</html>
