<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HMI 全符號一屏輸入系統</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        :root {
            --bg: #000; --card: #1c1c1e; --primary: #0a84ff;
            --success: #30d158; --text: #fff; --dim: #8e8e93;
        }

        body {
            font-family: -apple-system, sans-serif;
            background: var(--bg); color: var(--text);
            margin: 0; padding: 10px; height: 100vh;
            display: flex; flex-direction: column; box-sizing: border-box;
        }

        /* 數據監控 */
        .metrics { display: flex; justify-content: space-between; font-size: 13px; color: var(--dim); padding-bottom: 5px; }

        /* 顯示區 */
        .display { background: var(--card); padding: 12px; border-radius: 10px; border: 1px solid #333; margin-bottom: 8px; }
        #sentence-box { font-size: 22px; color: #00ffcc; min-height: 28px; word-break: break-all; }
        #buffer-box { font-size: 14px; color: var(--dim); margin-top: 4px; height: 18px; }

        /* AI 預測列 */
        .predict-bar {
            display: flex; overflow-x: auto; gap: 8px; padding: 8px 0;
            min-height: 40px; scrollbar-width: none;
        }
        .predict-bar::-webkit-scrollbar { display: none; }
        .predict-item {
            background: #2c2c2e; padding: 6px 14px; border-radius: 15px;
            white-space: nowrap; font-size: 17px; border: 1px solid #444;
        }
        .predict-item.history { border-color: var(--success); color: var(--success); }

        /* 核心：全符號鍵盤佈局 (6欄) */
        .keyboard {
            display: grid;
            grid-template-columns: repeat(6, 1fr); /* 這裡改為6欄位 */
            gap: 6px;
            flex-grow: 1;
            align-content: start;
        }
        .key {
            background: var(--card); border: none; border-radius: 8px;
            color: white; font-size: 18px; font-weight: bold;
            aspect-ratio: 1 / 1; /* 保持正方形 */
            display: flex; align-items: center; justify-content: center;
        }
        .key:active { background: var(--primary); }

        /* 功能控制 */
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .ctrl-btn { padding: 12px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; color: white; }
        .btn-voice { background: #ff453a; }
        .btn-send { background: var(--primary); }
    </style>
</head>
<body>

    <div class="metrics">
        <span id="wpm">速度: 0 字/分</span>
        <span id="status">模式: 全聲母一屏</span>
    </div>

    <div class="display">
        <div id="sentence-box"></div>
        <div id="buffer-box"></div>
    </div>

    <div class="predict-bar" id="predict-bar"></div>

    <div class="keyboard" id="keyboard"></div>

    <div class="controls">
        <button class="ctrl-btn btn-voice" onclick="startVoice()">🎤 語音輸入</button>
        <button class="ctrl-btn btn-send" onclick="sendAndClear()">✅ 傳送/學習</button>
    </div>

<script>
    const LIFF_ID = "2009598618-mYOYGEoM";
    const bpmf = ["ㄅ","ㄆ","ㄇ","ㄈ","ㄉ","ㄊ","ㄋ","ㄌ","ㄍ","ㄎ","ㄏ","ㄐ","ㄑ","ㄒ","ㄓ","ㄔ","ㄕ","ㄖ","ㄗ","ㄘ","ㄙ","ㄧ","ㄨ","ㄩ","ㄚ","ㄛ","ㄜ","ㄝ","ㄞ","ㄟ","ㄠ","ㄡ","ㄢ","ㄣ","ㄤ","ㄥ","ㄦ"];
    
    let sentence = "", inputBuffer = "", startTime = null, wordCount = 0;

    // 私人記憶
    function learn(ini, word) {
        if (!ini || !word) return;
        let h = JSON.parse(localStorage.getItem('hmi_v3') || '{}');
        h[ini] = [word, ...((h[ini] || []).filter(w => w !== word))].slice(0, 5);
        localStorage.setItem('hmi_v3', JSON.stringify(h));
    }

    function renderKB() {
        const kb = document.getElementById('keyboard');
        kb.innerHTML = "";
        bpmf.forEach(char => {
            const btn = document.createElement('button');
            btn.className = 'key';
            btn.innerText = char;
            btn.onclick = () => {
                if (!startTime) startTime = new Date();
                inputBuffer += char;
                document.getElementById('buffer-box').innerText = inputBuffer;
                updatePredicts();
            };
            kb.appendChild(btn);
        });
    }

    function updatePredicts() {
        const bar = document.getElementById('predict-bar');
        bar.innerHTML = "";
        const history = JSON.parse(localStorage.getItem('hmi_v3') || '{}')[inputBuffer] || [];
        const defaults = ["喝水", "謝謝", "翻身", "救命"]; // 這裡可接入更複雜的 AI
        const list = [...new Set([...history, ...defaults])];

        list.forEach(word => {
            const d = document.createElement('div');
            d.className = `predict-item ${history.includes(word) ? 'history' : ''}`;
            d.innerText = word;
            d.onclick = () => {
                learn(inputBuffer, word);
                sentence += word; wordCount += word.length;
                document.getElementById('sentence-box').innerText = sentence;
                inputBuffer = ""; document.getElementById('buffer-box').innerText = "";
                bar.innerHTML = "";
                updateWPM();
            };
            bar.appendChild(d);
        });
    }

    function updateWPM() {
        if (!startTime) return;
        const mins = (new Date() - startTime) / 60000;
        document.getElementById('wpm').innerText = `速度: ${Math.round(wordCount / mins) || 0} 字/分`;
    }

    function sendAndClear() {
        if (sentence.trim() && liff.isInClient()) liff.sendMessages([{ type: 'text', text: `【HMI】: ${sentence}` }]);
        sentence = ""; inputBuffer = ""; wordCount = 0; startTime = null;
        document.getElementById('sentence-box').innerText = "";
        document.getElementById('buffer-box').innerText = "";
        renderKB();
    }

    function startVoice() {
        const sr = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        sr.lang = 'zh-TW';
        sr.onresult = (e) => { sentence += e.results[0][0].transcript; document.getElementById('sentence-box').innerText = sentence; };
        sr.start();
    }

    liff.init({ liffId: LIFF_ID }).then(renderKB);
</script>
</body>
</html>
