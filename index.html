<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HMI 肢障友善科研系統 V15</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        :root { --bg: #000; --card: #1c1c1e; --primary: #0a84ff; --success: #30d158; --danger: #ff453a; --warm: #ff9f0a; --text: #fff; --dim: #8e8e93; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 8px; height: 100vh; display: flex; flex-direction: column; box-sizing: border-box; overflow: hidden; }
        
        .metrics { display: flex; justify-content: space-between; font-size: 12px; color: var(--dim); padding-bottom: 5px; }
        .display { background: var(--card); padding: 12px; border-radius: 12px; border: 1px solid #333; margin-bottom: 8px; }
        #sentence-box { font-size: 24px; color: #00ffcc; min-height: 28px; word-break: break-all; }
        #buffer-box { font-size: 18px; color: #ffcc00; margin-top: 4px; height: 20px; font-weight: bold; }

        /* 預測列 */
        .predict-bar { display: flex; overflow-x: auto; gap: 12px; padding: 5px 0 15px 0; min-height: 65px; scrollbar-width: none; }
        .predict-bar::-webkit-scrollbar { display: none; }
        .predict-item { background: #2c2c2e; padding: 14px 26px; border-radius: 18px; white-space: nowrap; font-size: 22px; border: 2px solid #444; color: #fff; }
        .predict-item.emergency { border-color: var(--danger); color: var(--danger); font-weight: bold; }
        .predict-item.needs { border-color: var(--warm); color: var(--warm); }

        /* 5 欄位鍵盤 */
        .keyboard { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; flex-grow: 1; align-content: start; }
        .key { background: var(--card); border: none; border-radius: 10px; color: white; font-size: 24px; font-weight: bold; height: 60px; display: flex; align-items: center; justify-content: center; }
        .key:active { background: var(--primary); transform: scale(0.92); }
        .key.del { background: #3a3a3c; color: var(--danger); font-size: 18px; }
        .key.clr { background: #3a3a3c; color: var(--warm); font-size: 18px; }

        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .ctrl-btn { padding: 15px; border-radius: 12px; border: none; font-weight: bold; font-size: 18px; color: white; }
        .btn-v { background: var(--danger); }
        .btn-s { background: var(--primary); }
    </style>
</head>
<body>
    <div class="metrics">
        <span id="wpm">速度: 0 字/分</span>
        <span id="status">模式: 時空感知 V15</span>
    </div>
    <div class="display">
        <div id="sentence-box"></div>
        <div id="buffer-box"></div>
    </div>
    <div id="predict-bar" class="predict-bar"></div>
    <div id="keyboard" class="keyboard"></div>
    <div class="controls">
        <button class="ctrl-btn btn-v" onclick="startVoice()">🎤 語音輸入</button>
        <button class="ctrl-btn btn-s" onclick="sendAndClear()">✅ 傳送</button>
    </div>

<script>
    const bpmf = ["ㄅ","ㄆ","ㄇ","ㄈ","ㄉ","ㄊ","ㄋ","ㄌ","ㄍ","ㄎ","ㄏ","ㄐ","ㄑ","ㄒ","ㄓ","ㄔ","ㄕ","ㄖ","ㄗ","ㄘ","ㄙ","ㄧ","ㄨ","ㄩ","ㄚ","ㄛ","ㄜ","ㄝ","ㄞ","ㄟ","ㄠ","ㄡ","ㄢ","ㄣ","ㄤ","ㄥ","ㄦ"];
    
    const aiLib = {
        "ㄗㄢ": ["早安", "讚"], "ㄋㄏ": ["你好", "您好"], 
        "ㄏㄕ": ["喝水", "還是"], "ㄉㄅ": ["想大便", "翻身"], 
        "ㄒㄅ": ["想小便", "休息"], "ㄐㄐ": ["緊急🚨", "救命"], "ㄅㄕ": ["報時🕰️"]
    };

    const chainLib = {
        "早安": ["要喝水嗎？", "想大便", "想小便", "心情如何？"],
        "喝水": ["還要", "調水溫", "不喝了", "謝謝"],
        "還要": ["太燙了", "太冰了", "溫一點", "大口一點"],
        "想大便": ["肚子痛", "要換尿布", "不舒服"],
        "緊急": ["我不舒服", "救救我", "快叫人", "找醫生"]
    };

    const lifeSafe = ["緊急🚨", "喝水💧", "大便💩", "小便🚽", "報時🕰️", "早安☀️"];

    let sentence = "", inputBuffer = "", startTime = null, wordCount = 0, lastTime = 0;

    function renderKB() {
        const kb = document.getElementById('keyboard');
        kb.innerHTML = "";
        bpmf.forEach(c => {
            const btn = document.createElement('button');
            btn.className = 'key'; btn.innerText = c;
            btn.onclick = () => {
                if (!startTime) startTime = new Date();
                inputBuffer += c;
                document.getElementById('buffer-box').innerText = inputBuffer;
                updatePredicts();
            };
            kb.appendChild(btn);
        });
        createKey(" ", () => { inputBuffer += " "; document.getElementById('buffer-box').innerText = inputBuffer; }, "key");
        createKey("⌫ 刪除", handleDelete, "key del");
        createKey("🧹 全清", handleClearAll, "key clr");
        updatePredicts();
    }

    function createKey(txt, onclick, cls) {
        const btn = document.createElement('button');
        btn.className = cls; btn.innerText = txt; btn.onclick = onclick;
        document.getElementById('keyboard').appendChild(btn);
    }

    function updatePredicts() {
        const bar = document.getElementById('predict-bar');
        bar.innerHTML = "";
        let list = [];

        if (inputBuffer !== "") {
            const hist = JSON.parse(localStorage.getItem('hmi_v15_mem') || '{}')[inputBuffer] || [];
            list = [...new Set([...hist, ...(aiLib[inputBuffer] || [])])];
            if (list.length === 0) list = lifeSafe;
        } else {
            const last2 = sentence.slice(-2);
            list = chainLib[last2] || lifeSafe;
        }

        list.forEach(word => {
            const d = document.createElement('div');
            d.className = 'predict-item';
            if (word.includes("緊急")) d.classList.add('emergency');
            if (["喝水", "大便", "小便", "報時"].some(k => word.includes(k))) d.classList.add('needs');
            
            d.innerText = word;
            d.onclick = () => {
                let final = word.replace(/[🚨💧💩🚽🕰️☀️]/g, "");
                
                // --- 更新重點：報時加上日期與星期 ---
                if (final === "報時") {
                    const now = new Date();
                    const days = ['日', '一', '二', '三', '四', '五', '六'];
                    const dateStr = `${now.getFullYear()}年${now.getMonth() + 1}月${now.getDate()}日(週${days[now.getDay()]})`;
                    const timeStr = `${now.getHours()}:${String(now.getMinutes()).padStart(2, '0')}`;
                    final = `今天是 ${dateStr}，現在是 ${timeStr} `;
                }

                if (inputBuffer !== "") learn(inputBuffer, final);
                sentence += final;
                wordCount += final.length;
                document.getElementById('sentence-box').innerText = sentence;
                inputBuffer = "";
                document.getElementById('buffer-box').innerText = "";
                updateWPM();
                updatePredicts();
            };
            bar.appendChild(d);
        });
    }

    function learn(ini, word) {
        let h = JSON.parse(localStorage.getItem('hmi_v15_mem') || '{}');
        h[ini] = [word, ...((h[ini] || []).filter(w => w !== word))].slice(0, 5);
        localStorage.setItem('hmi_v15_mem', JSON.stringify(h));
    }

    function updateWPM() {
        if (!startTime) return;
        const mins = (new Date() - startTime) / 60000;
        document.getElementById('wpm').innerText = `速度: ${Math.round(wordCount / mins) || 0} 字/分`;
    }

    function handleClearAll() {
        sentence = ""; inputBuffer = ""; wordCount = 0; startTime = null;
        document.getElementById('sentence-box').innerText = "";
        document.getElementById('buffer-box').innerText = "";
        updatePredicts();
    }

    function handleDelete() {
        if (inputBuffer.length > 0) {
            inputBuffer = inputBuffer.slice(0, -1);
            document.getElementById('buffer-box').innerText = inputBuffer;
        } else {
            sentence = sentence.slice(0, -1);
            document.getElementById('sentence-box').innerText = sentence;
        }
        updatePredicts();
    }

    function sendAndClear() {
        if (sentence.trim() && liff.isInClient()) liff.sendMessages([{ type: 'text', text: `【HMI】: ${sentence}` }]);
        handleClearAll();
    }

    function startVoice() {
        const sr = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        sr.lang = 'zh-TW';
        sr.onresult = (e) => { sentence += e.results[0][0].transcript; document.getElementById('sentence-box').innerText = sentence; updatePredicts(); };
        sr.start();
    }

    liff.init({ liffId: "2009598618-mYOYGEoM" }).then(renderKB);
</script>
</body>
</html>
